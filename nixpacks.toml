[phases.setup]
nixPkgs = ["nodejs_20", "nginx"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[phases.post_build]
cmds = [
  "mkdir -p /etc/nginx/conf.d",
  "cp nginx.conf /etc/nginx/conf.d/default.conf",
  "mkdir -p /usr/share/nginx/html",
  "cp -r dist/* /usr/share/nginx/html/"
]

[start]
cmd = "nginx -g 'daemon off;'"
